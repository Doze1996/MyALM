<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>NII 净利息收入</title><link rel="stylesheet" href="../assets/styles.css"></head><body><div class="layout"><aside class="sidebar"><h1 class="brand">MyALM</h1><nav data-sidebar></nav></aside><main class="content"><section class="doc-section"><h1>NII 净利息收入</h1><p class="lead">NII 从收益角度观察利率变化对未来一段时间净利息收入的影响。</p><h2>一、核心思路</h2><p>NII 关注未来一定期间内利息收入和利息支出的变化，常用于评估短中期盈利敏感性。</p><h2>二、简化计算框架</h2><pre>NII = 利息收入 - 利息支出
ΔNII = 冲击情景 NII - 基准情景 NII</pre><h2>三、与 EVE 的区别</h2><table><thead><tr><th>项目</th><th>NII</th><th>EVE</th></tr></thead><tbody><tr><td>视角</td><td>收益视角</td><td>价值视角</td></tr><tr><td>关注期限</td><td>通常较短，例如一年</td><td>覆盖全部未来现金流</td></tr><tr><td>输出</td><td>净利息收入变化</td><td>经济价值变化</td></tr></tbody></table><h2>四、开发关注点</h2><p>NII 需要处理新发生业务假设、到期续作假设、利率重定价和计息规则。与 EVE 相比，NII 更依赖预算和业务增长假设。</p></section></main></div><script src="../sidebar.js"></script><script src="../assets/app.js"></script></body></html>
