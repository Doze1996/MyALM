<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>NSFR 净稳定资金比例</title><link rel="stylesheet" href="../assets/styles.css"></head><body><div class="layout"><aside class="sidebar"><h1 class="brand">MyALM</h1><nav data-sidebar></nav></aside><main class="content"><section class="doc-section"><h1>NSFR 净稳定资金比例</h1><p class="lead">NSFR 关注中长期稳定资金来源是否能够支持资产和表外业务的资金需求。</p><h2>一、核心思路</h2><p>与 LCR 偏短期不同，NSFR 更强调一年期维度的资产负债结构稳定性。</p><h2>二、计算框架</h2><pre>NSFR = 稳定资金来源 / 稳定资金需求</pre><h2>三、常见数据</h2><table><thead><tr><th>类别</th><th>说明</th></tr></thead><tbody><tr><td>稳定资金来源</td><td>资本、长期负债、稳定存款等</td></tr><tr><td>稳定资金需求</td><td>贷款、投资资产、表外项目等</td></tr><tr><td>期限与客户类型</td><td>影响稳定性权重</td></tr><tr><td>产品分类</td><td>影响指标分类和权重</td></tr></tbody></table><h2>四、开发关注点</h2><p>NSFR 依赖稳定资金分类和权重参数。数据加工时要重点关注产品映射、剩余期限、交易对手类型和币种口径。</p></section></main></div><script src="../sidebar.js"></script><script src="../assets/app.js"></script></body></html>
