<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>IRRBB 银行账簿利率风险</title><link rel="stylesheet" href="../assets/styles.css"></head><body><div class="layout"><aside class="sidebar"><h1 class="brand">MyALM</h1><nav data-sidebar></nav></aside><main class="content"><section class="doc-section"><h1>IRRBB 银行账簿利率风险</h1><p class="lead">IRRBB 关注银行账簿业务在利率变化下产生的经济价值和收益波动。</p><h2>一、风险来源</h2><table><thead><tr><th>来源</th><th>说明</th></tr></thead><tbody><tr><td>重定价风险</td><td>资产和负债利率调整时间不一致</td></tr><tr><td>收益率曲线风险</td><td>不同期限利率变化幅度不同</td></tr><tr><td>基准风险</td><td>资产和负债使用不同利率基准</td></tr><tr><td>期权性风险</td><td>提前还款、提前支取等客户行为影响<a href="./cashflow.html">现金流</a></td></tr></tbody></table><h2>二、常见计量视角</h2><ul><li><a href="./eve.html">EVE</a>：关注经济价值变化。</li><li><a href="./nii.html">NII</a>：关注未来一段时间净利息收入变化。</li><li><a href="./gap-analysis.html">重定价缺口</a>：关注利率调整时间错配。</li></ul><h2>三、系统实现</h2><p>IRRBB 通常需要账户现金流、重定价信息、利率曲线、行为模型和冲击情景。计算结果要能追溯到产品、机构、币种和情景。</p></section></main></div><script src="../sidebar.js"></script><script src="../assets/app.js"></script></body></html>
